<!DOCTYPE html>
<html>
<head>
    <title>Scanner</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f6f9;
        }

        .box {
            background: white;
            width: 350px;
            margin: auto;
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
        }

        #reader {
            width: 100%;
            margin-top: 10px;
        }

        button {
            padding: 10px;
            background: #0a3d62;
            color: white;
            border: none;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="box">

    <h3>{{ destination }} Scanner</h3>

    <div id="reader"></div>

    <p id="status" style="color:green;"></p>

    <a href="/logout"><button>Logout</button></a>

</div>

<script>
    let lastScanned = null;

    function onScanSuccess(decodedText) {

        if (decodedText === lastScanned) return;
        lastScanned = decodedText;

        document.getElementById("status").innerText = "Scanning...";

        fetch("/scan", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ trip_id: decodedText })
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById("status").innerText = "✅ Scan saved";
        })
        .catch(err => {
            document.getElementById("status").innerText = "❌ Error";
        });
    }

    let scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
    ).catch(err => {
        document.getElementById("status").innerText = "Camera error: " + err;
    });
</script>

</body>
</html>
