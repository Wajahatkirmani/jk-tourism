<script src="https://unpkg.com/html5-qrcode"></script>

<script>
    let lastScanned = null;

    function onScanSuccess(decodedText) {

        // Prevent duplicate scans
        if (decodedText === lastScanned) return;
        lastScanned = decodedText;

        // Send scan to backend WITHOUT reload
        fetch("/scan", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ trip_id: decodedText })
        })
        .then(response => response.json())
        .then(data => {
            console.log("Scan saved:", data);

            // Optional: show message
            document.getElementById("status").innerText = "✅ Scan saved";
        })
        .catch(err => {
            console.error(err);
            document.getElementById("status").innerText = "❌ Error saving scan";
        });
    }

    let scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
    );
</script>
