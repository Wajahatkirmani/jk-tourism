<!DOCTYPE html>
<html>
<head>
    <title>Scanner Login</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f6f9;
        }

        .box {
            background: white;
            width: 300px;
            margin: auto;
            margin-top: 50px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        button {
            background: #0a3d62;
            color: white;
            padding: 10px;
            border: none;
            width: 95%;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="box">
    <h3>Scanner Login</h3>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
