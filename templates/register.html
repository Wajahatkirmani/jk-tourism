<!DOCTYPE html>
<html>
<head>
    <title>Register Tourist</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f6f9;
        }

        .box {
            background: white;
            width: 350px;
            margin: auto;
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        input, select {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        button {
            background: #0a3d62;
            color: white;
            padding: 10px;
            border: none;
            width: 95%;
            margin-top: 10px;
            cursor: pointer;
        }

        .origin-box {
            text-align: left;
            height: 150px;
            overflow-y: scroll;
            border: 1px solid #ccc;
            padding: 8px;
            margin: 10px auto;
            width: 90%;
            background: #fafafa;
        }

        .origin-box label {
            display: block;
            margin-bottom: 5px;
        }
    </style>

    <script>
        async function updateOrigin() {
            let type = document.getElementById("tourist_type").value;
            let container = document.getElementById("originContainer");

            container.innerHTML = "";

            let file = type === "Domestic" ? "/static/states.json" : "/static/countries.json";

            let response = await fetch(file);
            let data = await response.json();

            data.forEach(item => {
                let div = document.createElement("div");

                div.innerHTML = `
                    <label>
                        <input type="checkbox" name="origin" value="${item}">
                        ${item}
                    </label>
                `;

                container.appendChild(div);
            });
        }

        window.onload = updateOrigin;
    </script>

</head>

<body>

<div class="box">

    <!-- LOGO -->
    <img src="{{ url_for('static', filename='logo.png') }}" width="100" style="margin-bottom:10px;">

    <h3>J&K Tourism Registration</h3>

    <form method="POST">

        <label>Entry Mode</label><br>
        <select name="entry_mode" required>
            <option value="">Select</option>
            <option>Air</option>
            <option>Road</option>
            <option>Rail</option>
        </select>

        <label>Tourist Type</label><br>
        <select name="tourist_type" id="tourist_type" onchange="updateOrigin()" required>
            <option>Domestic</option>
            <option>International</option>
        </select>

        <label>Origin (Select Multiple)</label>

        <!-- CHECKBOX LIST -->
        <div id="originContainer" class="origin-box"></div>

        <label>Male</label><br>
        <input type="number" name="male" min="0" required>

        <label>Female</label><br>
        <input type="number" name="female" min="0" required>

        <label>Children</label><br>
        <input type="number" name="children" min="0" value="0">

        <button type="submit">Generate QR</button>

    </form>

</div>

</body>
</html>
